<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketing Jeopardy</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="shortcut icon" href="SSA-Wordmark.png" type="image/x-icon" />
  </head>
  <body>
    <div>
      <img src="SSA-Wordmark.png" alt="SSA LOGO" width="50px" height="50px" />
    </div>
    <h1>Marketing Jeopardy</h1>

    <div class="score-bar">
      <div class="score">Score: $<span id="score">0</span></div>
      <button class="reset-btn" onclick="resetGame()">↺ Reset</button>
    </div>

    <div class="board">
      <div class="categories" id="cat-headers"></div>
      <div class="cells" id="board"></div>
    </div>

    <div class="modal-bg" id="modal">
      <div class="modal">
        <div class="modal-cat" id="m-cat"></div>
        <div class="modal-points" id="m-pts"></div>
        <div class="modal-clue" id="m-clue"></div>
        <div class="modal-answer" id="m-answer"></div>
        <div class="btn-row" id="m-btns"></div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
